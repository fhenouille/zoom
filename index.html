<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/zoom/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom Meetings</title>
    <!-- GitHub Pages SPA redirect: restaure l'URL réelle à partir du paramètre injecté par 404.html -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var path = redirect.startsWith('/') ? redirect : '/' + redirect;
          window.history.replaceState(null, '', '/zoom' + path);
        }
      })();
    </script>
    <script type="module" crossorigin src="/zoom/assets/index-BkPZ68jL.js"></script>
    <link rel="stylesheet" crossorigin href="/zoom/assets/index-BS8RFIYV.css">
